<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <title>PixelAry</title>
</head>
<body>
    <header>PixelAry</header>
    <div id="canvas"></div>
    <div id="palette">
        <div class="colors">
            <div id="red"></div>
            <div id="green"></div>
            <div id="blue"></div>
            <div id="yellow"></div>
            <div id="cyan"></div>
            <div id="magenta"></div>
            <div id="black"></div>
            <div id="white"></div>
        </div>
        <div id="brush" class="brushes">🖌 brush</div>
        <div id="eraser" class="brushes">⌫ eraser</div>
    </div>
    <div id="menu">
        <div id="prompt">Prompt</div>
        <div id="timer">Timer</div>
        <div id="menu-buttons">
            <button id="clear">Clear Canvas</button>
            <button id="share">Share Canvas</button>
        </div>
    </div>
    <script>
        const canvas = document.querySelector("#canvas");

        for (let i = 0; i < 25 * 25; i += 1) {
            const pixel = document.createElement("div");
            pixel.className = "pixel";
            canvas.append(pixel);
        }
    </script>
</body>
</html>
