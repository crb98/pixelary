<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script defer src="index.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>PixelAry</title>
</head>
<body>
    <header>PixelAry</header>
    <div id="canvas"></div>
    <div id="palette">
        <div class="colours">
            <div id="red"></div>
            <div id="green"></div>
            <div id="blue"></div>
            <div id="yellow"></div>
            <div id="cyan"></div>
            <div id="magenta"></div>
            <div id="black"></div>
            <div id="white"></div>
        </div>
    </div>
    <div id="menu">
        <div id="prompt">Prompt</div>
        <div id="timer">Timer</div>
        <div id="menu-buttons">
            <button id="share">Share</button>
            <button id="gallery">Gallery</button>
        </div>
    </div>
</body>
</html>
